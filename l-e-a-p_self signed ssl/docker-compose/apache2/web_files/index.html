<!-- Dont forget to type sudo chmod -R 777 /var/www
for enabling write permission -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linux-Engineer-Applied-Practice Dashboard</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #1e1e1e;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        .typing-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .typing-line {
            overflow: hidden;
            white-space: nowrap;
            margin: 5px auto;
            letter-spacing: .15em;
            display: inline-block;
            opacity: 0;
        }
        .typing-line.done {
            border-right: none;
        }
        @keyframes typing {
            from { width: 0; opacity: 1; }
            to { width: 100%; opacity: 1; }
        }
        
        /* Two-column layout */
        .shortcuts-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            max-width: 800px;
            width: 100%;
            margin-top: 40px;
        }
        .column {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .service-section {
            display: flex;
            flex-direction: column;
        }
        .service-header {
            padding: 10px;
            border-bottom: 2px solid #444;
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 15px;
        }
        .shortcuts {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .shortcuts a {
            text-decoration: none;
            color: white;
            background: #333;
            padding: 15px 30px;
            border-radius: 5px;
            transition: transform 0.2s, background 0.3s;
        }
        .shortcuts a:hover {
            transform: scale(1.05);
            background: magenta;
        }
        
        @media (max-width: 768px) {
            .shortcuts-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const lines = document.querySelectorAll(".typing-line");
            let delay = 0;
            lines.forEach((line, index) => {
                setTimeout(() => {
                    line.style.animation = `typing ${2 + index}s steps(40, end) forwards`;
                    line.style.opacity = "1";
                    setTimeout(() => {
                        line.classList.add("done");
                    }, (2 + index) * 1000);
                }, delay);
                delay += (2 + index) * 1000;
            });
            
            // Try to get client IP (fallback to generic text)
            fetch('https://api.ipify.org?format=json')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('client-ip').textContent = data.ip;
                })
                .catch(() => {
                    document.getElementById('client-ip').textContent = 'visitor';
                });
        });
    </script>
</head>
<body>
    <div class="typing-container">
        <h1 class="typing-line">Hi! @<span id="client-ip">...</span></h1>
        <h3 class="typing-line"><b>This dashboard is compiled from</b></h3>
        <h3 class="typing-line"><b>Linux-Engineer-Applied-Practice</b></h3>
    </div>
    
    <div class="shortcuts-container">
        <!-- Left column: WAN/Public -->
        <div class="column">
            <!-- Accessible from WAN/Public -->
            <div class="service-section">
                <div class="service-header">Accessible from WAN/Public</div>
                <div class="shortcuts">
                    <a href="/deployedWebapps.html" target="_blank">Deployed Webapps (Sample)</a>
                </div>
            </div>
            
            <!-- Restricted from WAN/IP Public -->
            <div class="service-section">
                <div class="service-header">Restricted from WAN/IP Public</div>
                <div class="shortcuts">
                    <a href="/phpmyadmin/" target="_blank">phpMyAdmin</a>
                    <a href="/probe" target="_blank">Probe</a>
                </div>
            </div>
        </div>
        
        <!-- Right column: VPN -->
        <div class="column">
            <div class="service-section">
                <div class="service-header">Accessible from VPN</div>
                <div class="shortcuts">
                    <a href="https://10.20.0.2/phpmyadmin/" target="_blank">phpMyAdmin</a>
                    <a href="https://10.20.0.2:8443" target="_blank">Apache Tomcat Manager</a>
                    <a href="https://10.20.0.2/probe" target="_blank">Probe</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
