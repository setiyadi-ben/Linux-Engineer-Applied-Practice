<VirtualHost *:443>
    ServerName leap_apache2-httpd
    DocumentRoot /usr/local/apache2/htdocs
    
    # --- SSL (pakai path yang httpd expect) ---
    SSLEngine on
    SSLProxyEngine on
    SSLCertificateFile /usr/local/apache2/ssl/server.crt
    SSLCertificateKeyFile /usr/local/apache2/ssl/server.key
    SSLProxyVerify none
    SSLProxyCheckPeerCN off
    SSLProxyCheckPeerName off
    
    # --- Proxy headers ---
    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"
    
    # Reverse Proxy Mappings
    ProxyPass        /phpmyadmin http://l-e-a-p_pma/
    ProxyPassReverse /phpmyadmin http://l-e-a-p_pma/
    # Access control for phpMyAdmin
    # Use VPN and access https://10.20.0.2/phpmyadmin type ip_route (tap_softether vpn gateway ip)
    <Location /phpmyadmin>
        Require ip 10.20.0.0/20
    </Location>
    
    ProxyPass        /examples  https://l-e-a-p_tomcat:8443/examples
    ProxyPassReverse /examples  https://l-e-a-p_tomcat:8443/examples
    
    ProxyPass        /sample   https://l-e-a-p_tomcat:8443/sample
    ProxyPassReverse /sample   https://l-e-a-p_tomcat:8443/sample
    
    ProxyPass        /probe    https://l-e-a-p_tomcat:8443/probe
    ProxyPassReverse /probe    https://l-e-a-p_tomcat:8443/probe
    
    # Permissions
    <Directory /usr/local/apache2/htdocs>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    
    <Proxy *>
        Require all granted
    </Proxy>
</VirtualHost>