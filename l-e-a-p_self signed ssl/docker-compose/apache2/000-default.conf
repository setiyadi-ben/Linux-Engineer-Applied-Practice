<VirtualHost *:443>
    ServerName leap_apache2-httpd
    DocumentRoot /usr/local/apache2/htdocs
    
    # --- SSL (pakai path yang httpd expect) ---
    SSLEngine on
    SSLProxyEngine on
    SSLCertificateFile /usr/local/apache2/ssl/server.crt
    SSLCertificateKeyFile /usr/local/apache2/ssl/server.key
    SSLProxyVerify none
    SSLProxyCheckPeerCN off
    SSLProxyCheckPeerName off
    
    # --- Proxy headers ---
    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"
    
    # ====== phpMyAdmin via PHP-FPM ======
    Alias /phpmyadmin /var/www/html/phpmyadmin
    
    <Directory /var/www/html/phpmyadmin>
        DirectoryIndex index.php
        Options -Indexes +FollowSymLinks
        AllowOverride All
        
        # Access control - VPN only
        Require ip 10.20.0.0/20
        
        # Route semua .php file ke FPM container
        <FilesMatch \.php$>
            SetHandler "proxy:fcgi://l-e-a-p_pma:9000"
        </FilesMatch>
    </Directory>
    
    # ====== Tomcat Apps (tetap HTTPS proxy) ======
    ProxyPass        /examples  https://l-e-a-p_tomcat:8443/examples
    ProxyPassReverse /examples  https://l-e-a-p_tomcat:8443/examples
    
    ProxyPass        /sample   https://l-e-a-p_tomcat:8443/sample
    ProxyPassReverse /sample   https://l-e-a-p_tomcat:8443/sample
    
    # Access control - VPN only
    <Location /probe>
        Require ip 10.20.0.0/20
    </Location>
    ProxyPass        /probe    https://l-e-a-p_tomcat:8443/probe
    ProxyPassReverse /probe    https://l-e-a-p_tomcat:8443/probe
    
    # ====== Monitoring Services ======
    # Grafana - Metrics Visualization
    <Location /grafana>
        Require ip 10.20.0.0/20
    </Location>
    ProxyPass        /grafana  http://l-e-a-p_grafana:3000/
    ProxyPassReverse /grafana  http://l-e-a-p_grafana:3000/
    
    # Prometheus - Metrics Collection & Query
    <Location /prometheus>
        Require ip 10.20.0.0/20
    </Location>
    ProxyPass        /prometheus  http://l-e-a-p_prometheus:9090
    ProxyPassReverse /prometheus  http://l-e-a-p_prometheus:9090
    
    # # cAdvisor - Container Metrics
    # <Location /cadvisor>
    #     Require ip 10.20.0.0/20
    # </Location>
    # ProxyPass        /cadvisor  http://l-e-a-p_cadvisor:8080
    # ProxyPassReverse /cadvisor  http://l-e-a-p_cadvisor:8080
    
    # # Node Exporter - Host Metrics
    # <Location /node-exporter>
    #     Require ip 10.20.0.0/20
    # </Location>
    # ProxyPass        /node-exporter  http://l-e-a-p_node-exporter:9100
    # ProxyPassReverse /node-exporter  http://l-e-a-p_node-exporter:9100
    
    # ====== Default Directory ======
    <Directory /usr/local/apache2/htdocs>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    
    <Proxy *>
        Require all granted
    </Proxy>
</VirtualHost>